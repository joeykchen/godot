name: 🌐 Web Build Workflow

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Version number for the build"
      platforms:
        required: true
        type: string
        description: "Platforms to build"
      godot_base_branch:
        required: true
        type: string
        description: "Base branch for Godot"
      engine_version:
        required: true
        type: string
        description: "Engine version"
      common_args:
        required: true
        type: string
        description: "Common build arguments"
      release_args:
        required: true
        type: string
        description: "Release build arguments"
      editor_args:
        required: true
        type: string
        description: "Editor build arguments"
      event_name:
        required: true
        type: string
        description: "Event name triggering the build"
      release_tag:
        required: false
        type: string
        description: "Release tag name"
    secrets:
      GH_TOKEN:
        required: true

env:
  SCONS_CACHE: "${{github.workspace}}/.scons-cache/"
  SCONS_CACHE_LIMIT: "10000"
  EM_VERSION: 3.1.62
  EM_CACHE_FOLDER: "emsdk-cache"

jobs:
  web-build:
    name: 🌐 Web Build (${{ matrix.target }} - ${{ matrix.mode }})
    if: contains(inputs.platforms, 'web') || contains(inputs.platforms, 'all')
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          # Editor builds
          - target: editor
            mode: editor
            threads_flag: threads=no
            extra_flags: debug_symbols=no
            cache_key: web-editor
            source_file: bin/godot.web.editor.wasm32.nothreads.zip
            artifact_prefix: web-editor
            artifact_suffix: ""
            output_file: editor-web.zip
            release_file: editor-web.zip
          # Template builds
          - target: template_release
            mode: normal
            threads_flag: threads=no
            extra_flags: ""
            cache_key: web-template-normal
            source_file: bin/godot.web.template_release.wasm32.nothreads.zip
            artifact_prefix: web-template
            artifact_suffix: ""
            output_file: web.zip
            release_file: web.zip
          - target: template_release
            mode: threads
            threads_flag: threads=yes
            extra_flags: ""
            cache_key: web-template-threads
            source_file: bin/godot.web.template_release.wasm32.zip
            artifact_prefix: web-template
            artifact_suffix: "-threads"
            output_file: web-threads.zip
            release_file: web-threads.zip
          - target: template_release
            mode: worker
            threads_flag: threads=yes proxy_to_pthread=yes
            extra_flags: ""
            cache_key: web-template-worker
            source_file: bin/godot.web.template_release.wasm32.zip
            artifact_prefix: web-template
            artifact_suffix: "-worker"
            output_file: web-worker.zip
            release_file: web-worker.zip
          - target: template_release
            mode: minigame
            threads_flag: threads=no
            extra_flags: ""
            cache_key: web-template-minigame
            source_file: bin/godot.web.template_release.wasm32.nothreads.zip
            artifact_prefix: web-template
            artifact_suffix: "-minigame"
            output_file: web-minigame.zip
            release_file: web-minigame.zip
          - target: template_release
            mode: miniprogram
            threads_flag: threads=no
            extra_flags: ""
            cache_key: web-template-miniprogram
            source_file: bin/godot.web.template_release.wasm32.nothreads.zip
            artifact_prefix: web-template
            artifact_suffix: "-miniprogram"
            output_file: web-miniprogram.zip
            release_file: web-miniprogram.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup Emscripten
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{env.EM_VERSION}}
          actions-cache-folder: ${{env.EM_CACHE_FOLDER}}
          cache-key: emsdk-${{ matrix.cache_key }}-${{inputs.godot_base_branch}}-${{github.ref}}
      
      - name: Verify Emscripten Installation
        run: |
          emcc -v

      # Set up shared cache for Web builds
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: ${{ matrix.cache_key }}-${{inputs.godot_base_branch}}-${{github.ref}}
          restore-keys: |
            ${{ matrix.cache_key }}-${{inputs.godot_base_branch}}-
            ${{ matrix.cache_key }}-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Build Web
      - name: Build Web (${{ matrix.target }} - ${{ matrix.mode }})
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=web target=${{ matrix.target }} ${{ matrix.threads_flag }} ${{ matrix.extra_flags }} ${{ inputs.common_args }} ${{ matrix.target == 'template_release' && inputs.release_args || '' }}
          platform: web
          target: ${{ matrix.target }}

      - name: Prepare Files
        run: |
          mkdir -p artifacts
          cp ${{ matrix.source_file }} artifacts/${{ matrix.output_file }}

      - name: Upload Web Build Results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_prefix }}${{ matrix.artifact_suffix }}-${{ inputs.version }}
          path: artifacts/${{ matrix.output_file }}
          retention-days: 14

      - name: Publish to GitHub Release
        if: inputs.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/${{ matrix.release_file }}
          tag_name: ${{ inputs.release_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          