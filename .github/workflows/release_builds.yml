name: 🚀 Release Build
on:
  release:
    types: [created, edited]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release version (e.g. v2.0.1)'
        required: true
        default: 'v2.0.1'
      platforms:
        description: 'Platforms to build (comma-separated: android,ios,web,linux,macos,windows,all)'
        required: true
        default: 'android,ios,linux,macos,windows,web'

concurrency:
  group: ci-${{github.actor}}-${{github.head_ref || github.run_number}}-${{github.ref}}-release
  cancel-in-progress: true

env:
  ENGINE_VERSION: 4.2.2.stable
  # SCons cache settings to ensure efficient cache utilization
  SCONS_CACHE: "${{github.workspace}}/.scons-cache/"
  SCONS_CACHE_LIMIT: "10000"
  VERSION: 2.0.1
  GODOT_BASE_BRANCH: master

jobs:
  setup:
    name: 📋 Prepare Build Environment
    runs-on: ubuntu-20.04
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      platforms: ${{ steps.set-platforms.outputs.platforms }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Version Number
        id: set-version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.release_tag }}"
          fi
          VERSION="${VERSION#v}"  # Remove 'v' prefix (if present)
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set Build Platforms
        id: set-platforms
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            PLATFORMS="all"
          else
            PLATFORMS="${{ github.event.inputs.platforms }}"
          fi
          
          if [ "$PLATFORMS" == "all" ]; then
            PLATFORMS="android,ios,web,linux,macos,windows"
          fi
          
          echo "PLATFORMS=$PLATFORMS"
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT

  android-build:
    name: 🤖 Android Release
    needs: setup
    if: contains(needs.setup.outputs.platforms, 'android') || contains(needs.setup.outputs.platforms, 'all')
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # Set up shared cache for all Android architectures
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: android-release-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
          restore-keys: |
            android-release-${{env.GODOT_BASE_BRANCH}}-
            android-release-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Build in specific order to maximize cache utilization
      # First build debug and release versions of the same architecture to reuse compilation cache

      # arm32 builds (debug first, then release)
      - name: Build Android 32-bit Debug Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=android target=template_debug arch=arm32
          platform: android
          target: template_debug

      - name: Build Android 32-bit Release Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=android target=template_release arch=arm32
          platform: android
          target: template_release

      # arm64 builds (debug first, then release)
      - name: Build Android 64-bit Debug Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=android target=template_debug arch=arm64
          platform: android
          target: template_debug

      - name: Build Android 64-bit Release Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=android target=template_release arch=arm64
          platform: android
          target: template_release

      - name: Generate Final Android Templates
        run: |
          cd platform/android/java
          ./gradlew generateGodotTemplates
          echo "View generated files:"
          ls -la ../../..
          ls -la ../../../bin/

      - name: Upload Android Build Results
        uses: actions/upload-artifact@v4
        with:
          name: android-templates-${{ needs.setup.outputs.version }}
          path: |
            bin/android*.apk
            bin/android_source.zip
          retention-days: 14

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/android*.apk
            bin/android_source.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ios-build:
    name: 🍏 iOS Release
    needs: setup
    if: contains(needs.setup.outputs.platforms, 'ios') || contains(needs.setup.outputs.platforms, 'all')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Set up shared cache for all iOS builds
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: ios-release-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
          restore-keys: |
            ios-release-${{env.GODOT_BASE_BRANCH}}-
            ios-release-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps


      # Build in specific order to maximize cache utilization
      # Group by architecture, debug first then release

      # iOS Simulator arm64 builds
      - name: Build iOS Simulator (arm64) Debug Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=ios target=template_debug ios_simulator=yes arch=arm64
          platform: ios
          target: template_debug

      - name: Build iOS Simulator (arm64) Release Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=ios target=template_release ios_simulator=yes arch=arm64
          platform: ios
          target: template_release

      # iOS Simulator x86_64 builds
      - name: Build iOS Simulator (x86_64) Debug Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=ios target=template_debug ios_simulator=yes arch=x86_64
          platform: ios
          target: template_debug

      - name: Build iOS Simulator (x86_64) Release Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=ios target=template_release ios_simulator=yes arch=x86_64 generate_bundle=yes
          platform: ios
          target: template_release

      # iOS Device builds
      - name: Build iOS Device Debug Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=ios target=template_debug ios_simulator=no
          platform: ios
          target: template_debug

      - name: Build iOS Device Release Template
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=ios target=template_release ios_simulator=no generate_bundle=yes
          platform: ios
          target: template_release

      - name: Upload iOS Build Results
        uses: actions/upload-artifact@v4
        with:
          name: ios-templates-${{ needs.setup.outputs.version }}
          path: bin/godot_ios.zip
          retention-days: 14

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/godot_ios.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Windows PC editor build
  windows-editor-build:
    name: 🪟 Windows Editor Build
    needs: setup
    if: contains(needs.setup.outputs.platforms, 'windows') || contains(needs.setup.outputs.platforms, 'all')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Set up shared cache for Windows builds
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: windows-editor-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
          restore-keys: |
            windows-editor-${{env.GODOT_BASE_BRANCH}}-
            windows-editor-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Windows x86_64 editor build
      - name: Build Windows Editor (x86_64)
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=windows target=editor arch=x86_64
          platform: windows
          target: editor

      - name: Compress Windows Editor Build
        run: Compress-Archive -Path bin/godot.windows.editor.x86_64.exe -DestinationPath bin/godot-windows-editor-x86_64.zip
        shell: pwsh

      - name: Upload Windows Editor Build Results
        uses: actions/upload-artifact@v4
        with:
          name: windows-editor-${{ needs.setup.outputs.version }}
          path: bin/godot-windows-editor-x86_64.zip
          retention-days: 14

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/godot-windows-editor-x86_64.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Linux PC editor build
  linux-editor-build:
    name: 🐧 Linux Editor Build
    needs: setup
    if: contains(needs.setup.outputs.platforms, 'linux') || contains(needs.setup.outputs.platforms, 'all')
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Set up shared cache for Linux builds
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: linux-editor-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
          restore-keys: |
            linux-editor-${{env.GODOT_BASE_BRANCH}}-
            linux-editor-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Linux x86_64 editor build
      - name: Build Linux Editor (x86_64)
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=linuxbsd target=editor arch=x86_64
          platform: linuxbsd
          target: editor

      - name: Compress Linux Editor Build
        run: |
          chmod +x bin/godot.linuxbsd.editor.x86_64
          tar -czf bin/godot-linux-editor-x86_64.tar.gz -C bin godot.linuxbsd.editor.x86_64

      - name: Upload Linux Editor Build Results
        uses: actions/upload-artifact@v4
        with:
          name: linux-editor-${{ needs.setup.outputs.version }}
          path: bin/godot-linux-editor-x86_64.tar.gz
          retention-days: 14

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/godot-linux-editor-x86_64.tar.gz
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # macOS PC editor build
  macos-editor-build:
    name: 🍎 macOS Editor Build
    needs: setup
    if: contains(needs.setup.outputs.platforms, 'macos') || contains(needs.setup.outputs.platforms, 'all')
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Set up shared cache for macOS builds
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: macos-editor-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
          restore-keys: |
            macos-editor-${{env.GODOT_BASE_BRANCH}}-
            macos-editor-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # macOS x86_64 editor build
      - name: Build macOS Editor (x86_64)
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=macos target=editor arch=x86_64
          platform: macos
          target: editor

      # macOS arm64 editor build
      - name: Build macOS Editor (arm64)
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=macos target=editor arch=arm64
          platform: macos
          target: editor

      # Create Universal Binary
      - name: Create Universal Binary
        run: |
          mkdir -p universal/Godot.app/Contents/MacOS
          lipo -create -output universal/Godot.app/Contents/MacOS/Godot bin/godot.macos.editor.x86_64 bin/godot.macos.editor.arm64
          # Copy necessary files and directories
          cp -r misc/dist/macos_tools.app/* universal/Godot.app/
          # Ensure executable permissions
          chmod +x universal/Godot.app/Contents/MacOS/Godot
          # Compress to zip
          cd universal
          zip -r ../bin/godot-macos-editor-universal.zip Godot.app
          cd ..

      - name: Upload macOS Editor Build Results
        uses: actions/upload-artifact@v4
        with:
          name: macos-editor-${{ needs.setup.outputs.version }}
          path: bin/godot-macos-editor-universal.zip
          retention-days: 14

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: bin/godot-macos-editor-universal.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Web editor build
  web-editor-build:
    name: 🌐 Web Editor Build
    needs: setup
    if: contains(needs.setup.outputs.platforms, 'web') || contains(needs.setup.outputs.platforms, 'all')
    runs-on: ubuntu-22.04
    env:
      EM_VERSION: 3.1.39
      EM_CACHE_FOLDER: "emsdk-cache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup Emscripten
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{env.EM_VERSION}}
          actions-cache-folder: ${{env.EM_CACHE_FOLDER}}
          cache-key: emsdk-web-editor-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
      
      - name: Verify Emscripten Installation
        run: |
          emcc -v

      # Set up shared cache for Web Editor builds
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: web-editor-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
          restore-keys: |
            web-editor-${{env.GODOT_BASE_BRANCH}}-
            web-editor-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Build Web Editor
      - name: Build Web Editor
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=web target=editor
          platform: web
          target: editor

      # Prepare files for upload
      - name: Prepare Files
        run: |
          mkdir -p artifacts
          cp bin/godot.web.editor.wasm32.zip artifacts/web_editor.zip

      - name: Upload Web Editor Build Results
        uses: actions/upload-artifact@v4
        with:
          name: web-editor-${{ needs.setup.outputs.version }}
          path: artifacts/web_editor.zip
          retention-days: 14

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/web_editor.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Web template release build
  web-template-build:
    name: 🌐 Web Template Build
    needs: setup
    if: contains(needs.setup.outputs.platforms, 'web') || contains(needs.setup.outputs.platforms, 'all')
    runs-on: ubuntu-22.04
    env:
      EM_VERSION: 3.1.39
      EM_CACHE_FOLDER: "emsdk-cache"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup Emscripten
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: ${{env.EM_VERSION}}
          actions-cache-folder: ${{env.EM_CACHE_FOLDER}}
          cache-key: emsdk-web-template-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
      
      - name: Verify Emscripten Installation
        run: |
          emcc -v

      # Set up shared cache for Web Template builds
      - name: Set up build cache
        uses: actions/cache@v4
        with:
          path: ${{github.workspace}}/.scons-cache/
          # Do not use SHA in cache key to allow cache reuse across commits
          key: web-template-${{env.GODOT_BASE_BRANCH}}-${{github.ref}}
          restore-keys: |
            web-template-${{env.GODOT_BASE_BRANCH}}-
            web-template-

      - name: Setup Python and SCons
        uses: ./.github/actions/godot-deps

      # Build Web template_release
      - name: Build Web Template Release
        uses: ./.github/actions/godot-build
        with:
          sconsflags: platform=web target=template_release threads=no
          platform: web
          target: template_release

      # Prepare files for upload
      - name: Prepare Files
        run: |
          mkdir -p artifacts
          cp bin/godot.web.template_release.wasm32.zip artifacts/web_template_release.zip

      - name: Upload Web Template Build Results
        uses: actions/upload-artifact@v4
        with:
          name: web-template-${{ needs.setup.outputs.version }}
          path: artifacts/web_template_release.zip
          retention-days: 14

      - name: Publish to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/web_template_release.zip
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
